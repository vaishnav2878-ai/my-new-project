<!DOCTYPE html>
<html>
<head>
  <title>Order Success - E-Kart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins', sans-serif;
      background:#f1f3f6;
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      box-sizing:border-box;
    }

    .success-box{
      background:white;
      padding:35px 25px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      width:100%;
      max-width:420px;
    }

    .check{
      width:80px;
      height:80px;
      border-radius:50%;
      background:#28a745;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 auto 20px;
      font-size:40px;
      color:white;
      animation:pop 0.4s ease;
    }

    @keyframes pop{
      0%{ transform:scale(0); }
      100%{ transform:scale(1); }
    }

    h2{
      margin:10px 0;
      color:#28a745;
      font-size:28px;
    }

    p{
      color:#555;
      margin:8px 0;
      font-size:15px;
    }

    .order-details{
      margin-top:20px;
      background:#f9f9f9;
      border-radius:10px;
      padding:15px;
      text-align:left;
    }

    .detail-row{
      display:flex;
      justify-content:space-between;
      margin:10px 0;
      font-size:14px;
      gap:10px;
    }

    .detail-row span:first-child{
      color:#666;
    }

    .detail-row span:last-child{
      font-weight:600;
      color:#222;
      text-align:right;
      word-break:break-word;
    }

    .btn-group{
      margin-top:25px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .btn{
      background:#fb641b;
      color:white;
      border:none;
      padding:12px;
      border-radius:6px;
      cursor:pointer;
      font-size:15px;
      font-weight:500;
      width:100%;
    }

    .btn:hover{
      background:#e65c00;
    }

    .btn.secondary{
      background:#2874f0;
    }

    .btn.secondary:hover{
      background:#1258c8;
    }
  </style>
</head>

<body>

  <div class="success-box">
    <div class="check">✓</div>

    <h2>Order Placed!</h2>
    <p>Your order has been placed successfully.</p>

    <div class="order-details">
      <div class="detail-row">
        <span>Order ID:</span>
        <span id="orderId">N/A</span>
      </div>

      <div class="detail-row">
        <span>Payment:</span>
        <span id="paymentMethod">N/A</span>
      </div>

      <div class="detail-row">
        <span>Total:</span>
        <span id="orderTotal">₹0</span>
      </div>

      <div class="detail-row">
        <span>Status:</span>
        <span id="orderStatus">Order Placed</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn secondary" onclick="goOrders()">View Orders</button>
      <button class="btn" onclick="goHome()">Continue Shopping</button>
    </div>
  </div>

  <script>
    // Get all orders from localStorage
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    // Get latest order
    if (orders.length > 0) {
      let latestOrder = orders[orders.length - 1];

      document.getElementById("orderId").innerText = latestOrder.id || "N/A";
      document.getElementById("paymentMethod").innerText = latestOrder.paymentMethod || "N/A";
      document.getElementById("orderTotal").innerText = "₹" + (latestOrder.total || 0);
      document.getElementById("orderStatus").innerText = latestOrder.status || "Order Placed";
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function goOrders() {
      window.location.href = "orders.html";
    }
  </script>

</body>
</html>
