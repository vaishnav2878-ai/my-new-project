<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Add Product - E-Kart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .top-links {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .top-links a {
      text-decoration: none;
      background: #6f4e37;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: inline-block;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #444;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #6f4e37;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn {
      width: 100%;
      background: #6f4e37;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    .btn:hover {
      background: #5b3f2d;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-weight: 500;
      color: green;
    }

    .error {
      color: red;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .top-links {
        flex-direction: column;
      }

      .top-links a {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Admin - Add Product</h1>

    <div class="top-links">
      <a href="/admin-products.html">Manage Products</a>
      <a href="/index.html">Back to Home</a>
    </div>

    <form id="productForm" enctype="multipart/form-data">
      
      <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" placeholder="Enter product name" required>
      </div>

      <div class="form-group">
        <label for="price">Price (₹)</label>
        <input type="number" id="price" name="price" placeholder="Enter price" required>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="">Select Category</option>
          <option value="Shirt">Shirt</option>
          <option value="Pant">Pant</option>
          <option value="T-Shirt">T-Shirt</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter product description"></textarea>
      </div>

      <div class="form-group">
        <label for="stock">Stock</label>
        <input type="number" id="stock" name="stock" placeholder="Enter stock quantity" value="1" required>
      </div>

      <div class="form-group">
        <label for="image">Product Image</label>
        <input type="file" id="image" name="image" accept="image/*" required>
      </div>

      <button type="submit" class="btn">Add Product</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script>
    // ADMIN PASSWORD PROTECTION
const adminPass = localStorage.getItem("adminAuth");
if(adminPass !== "admin@2004"){
  const entered = prompt("Enter Admin Password:");
  if(entered !== "admin@2004"){
    alert("Wrong password! Access denied.");
    window.location.href = "/index.html";
  } else {
    localStorage.setItem("adminAuth", "admin@2004");
  }
}
    const form = document.getElementById("productForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const res = await fetch("/api/products/add", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          message.classList.remove("error");
          message.textContent = data.message || "Product added successfully!";
          form.reset();
        } else {
          message.classList.add("error");
          message.textContent = data.message || "Failed to add product";
        }

      } catch (error) {
        console.error("Add product error:", error);
        message.classList.add("error");
        message.textContent = "Server error while adding product";
      }
    });
  </script>

</body>
</html>
